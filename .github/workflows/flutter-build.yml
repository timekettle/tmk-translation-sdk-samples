name: Flutter Build

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches:
      - release/skill-validation

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Flutter/apps/tmk_translation_demo
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        working-directory: .
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="v0.0.0-dev"
          fi
          VERSION="${TAG#v}"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Build: $BUILD_NUMBER, Tag: $TAG"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('Flutter/apps/tmk_translation_demo/android/**/*.gradle*', 'Flutter/apps/tmk_translation_demo/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Create local.properties for Android
        run: |
          cat > android/local.properties << EOF
          sdk.dir=$ANDROID_HOME
          TMK_SAMPLE_APP_ID=${{ secrets.TMK_SAMPLE_APP_ID }}
          TMK_SAMPLE_APP_SECRET=${{ secrets.TMK_SAMPLE_APP_SECRET }}
          EOF

      - name: Build APK
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GH_ACCESS_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TMK_SAMPLE_APP_ID: ${{ secrets.TMK_SAMPLE_APP_ID }}
          TMK_SAMPLE_APP_SECRET: ${{ secrets.TMK_SAMPLE_APP_SECRET }}
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

      - name: Locate APK
        id: apk
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK_PATH="build/app/outputs/flutter-apk/tmk-translation-sdk-samples-${VERSION}.apk"
          if [ ! -f "$APK_PATH" ]; then
            APK_PATH=$(find build/app/outputs -name "*.apk" -not -name "*-unsigned*" | head -1)
          fi
          echo "APK: $APK_PATH"
          echo "APK size: $(du -h "$APK_PATH" | cut -f1)"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_name=tmk-translation-flutter-demo-${VERSION}-android.apk" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-demo-android-apk
          path: Flutter/apps/tmk_translation_demo/${{ steps.apk.outputs.apk_path }}
          retention-days: 14

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          APK_SRC="Flutter/apps/tmk_translation_demo/${{ steps.apk.outputs.apk_path }}"
          APK_DEST="${{ steps.apk.outputs.apk_name }}"
          cp "$APK_SRC" "$APK_DEST"
          gh release upload "${{ steps.version.outputs.tag }}" "$APK_DEST" --clobber

  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Flutter/apps/tmk_translation_demo
    steps:
      - uses: actions/checkout@v4

      - name: Configure git to use HTTPS instead of SSH
        working-directory: .
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Extract version from tag
        id: version
        working-directory: .
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="v0.0.0-dev"
          fi
          VERSION="${TAG#v}"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Build: $BUILD_NUMBER, Tag: $TAG"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create LocalSecrets.xcconfig
        run: |
          printf 'TMK_SAMPLE_APP_ID = %s\nTMK_SAMPLE_APP_SECRET = %s\n' \
            "${{ secrets.TMK_SAMPLE_APP_ID }}" \
            "${{ secrets.TMK_SAMPLE_APP_SECRET }}" \
            > ios/Flutter/LocalSecrets.xcconfig

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

      # ============ Fastlane 签名打包 ============
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true
          working-directory: Flutter/apps/tmk_translation_demo/ios

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            Flutter/apps/tmk_translation_demo/ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: pods-${{ runner.os }}-${{ hashFiles('Flutter/apps/tmk_translation_demo/ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build IPA with Fastlane
        id: build_ipa
        working-directory: ios
        env:
          MATCH_GIT_URL: https://github.com/timekettle/ios-certificates.git
          MATCH_GIT_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.FASTLANE_MATCH_PASSWORD }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          bundle exec fastlane ios release
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "ipa_name=$IPA_NAME" >> "$GITHUB_OUTPUT"

      # ============ 上传蒲公英 ============
      - name: Set up Python
        if: github.event_name == 'release'
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install Python Dependencies
        if: github.event_name == 'release'
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install requests==2.32.5

      - name: Upload to Pgyer
        if: github.event_name == 'release'
        working-directory: .
        env:
          PGYER_API_KEY: ${{ secrets.PGYER_API_KEY }}
          IM_WEBHOOK: ${{ secrets.IM_WEBHOOK }}
          IM_SECRET: ${{ secrets.IM_SECRET }}
        run: |
          python scripts/upload_to_pgyer.py \
            --path "${IPA_PATH}" \
            --key "${PGYER_API_KEY}" \
            --password "" \
            --im-webhook "${IM_WEBHOOK}" \
            --im-secret "${IM_SECRET}"

      # ============ 上传 GitHub Release ============
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" "${IPA_PATH}" --clobber

      # ============ 上传 Artifact（用于测试）============
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-demo-ios-ipa
          path: ${{ env.IPA_PATH }}
          retention-days: 14
