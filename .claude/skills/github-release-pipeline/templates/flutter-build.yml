name: Flutter Build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: <flutter-app-path>
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        working-directory: .
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="v0.0.0-dev"
          fi
          VERSION="${TAG#v}"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Build: $BUILD_NUMBER, Tag: $TAG"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '<java-version>'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('<flutter-app-path>/android/**/*.gradle*', '<flutter-app-path>/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

      - name: Rename APK
        id: rename
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK_SRC="build/app/outputs/flutter-apk/app-release.apk"
          APK_DEST="build/app/outputs/flutter-apk/<app-name>-${VERSION}-android.apk"
          mv "$APK_SRC" "$APK_DEST"
          echo "APK size: $(du -h "$APK_DEST" | cut -f1)"
          echo "apk_path=$APK_DEST" >> "$GITHUB_OUTPUT"
          echo "apk_name=<app-name>-${VERSION}-android.apk" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: <app-name>-android-apk
          path: <flutter-app-path>/${{ steps.rename.outputs.apk_path }}
          retention-days: 14

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "<flutter-app-path>/${{ steps.rename.outputs.apk_path }}" \
            --clobber
