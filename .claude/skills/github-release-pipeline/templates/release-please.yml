name: Release Please

on:
  push:
    branches:
      - <release-branch>

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          target-branch: ${{ github.ref_name }}
